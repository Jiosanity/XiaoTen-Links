name: Dispatch Static Ingest

on:
  push:
    branches:
      - main
    paths:
      - 'links.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger static site ingest
        env:
          GH_TOKEN: ${{ secrets.HUGO_SITE_PAT }}
        run: gh workflow run ingest-links.yml --repo Jiosanity/static-xiaoten-com --ref main
      
      - name: Comment on related issue
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'friendlink')
        uses: actions/github-script@v7
        with:
          script: |
            const commitMessage = context.payload.head_commit.message;
            const issueMatch = commitMessage.match(/#(\d+)/);
            
            if (issueMatch) {
              const issueNumber = parseInt(issueMatch[1]);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '🎉 友链已成功添加，静态资源发布流程已触发。\n\n稍后可以访问 https://www.xiaoten.com/pages/links/ 查看。\n\n感谢你的申请！'
              });
              
              // 关闭 Issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }
      
      - name: Notify sync completion
        run: |
          echo "✅ links.json ingest has been dispatched to static-xiaoten-com"
          echo "🚀 static-xiaoten-com will publish the updated file"
