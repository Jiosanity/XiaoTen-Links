name: Sync to Static Site

on:
  push:
    branches:
      - main
    paths:
      - 'links.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout links repository
        uses: actions/checkout@v4
        with:
          path: links-repo
      
      - name: Checkout static site repository
        uses: actions/checkout@v4
        with:
          repository: Jiosanity/static-xiaoten-com
          token: ${{ secrets.HUGO_SITE_PAT }}
          path: static-site
      
      - name: Sync links.json to static site
        run: |
          mkdir -p static-site/dist
          cp links-repo/links.json static-site/dist/links.json
          
          cd static-site
          if git diff --quiet dist/links.json; then
            echo "No changes in links.json"
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "Changes detected in links.json"
            echo "has_changes=true" >> $GITHUB_ENV
          fi
      
      - name: Commit and push changes
        if: env.has_changes == 'true'
        run: |
          cd static-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/links.json
          git commit -m "chore: sync links.json from XiaoTen-Links"
          git push
      
      - name: Comment on related PR
        if: env.has_changes == 'true' && github.event_name == 'push' && contains(github.event.head_commit.message, 'friendlink')
        uses: actions/github-script@v7
        with:
          script: |
            const commitMessage = context.payload.head_commit.message;
            const issueMatch = commitMessage.match(/#(\d+)/);
            
            if (issueMatch) {
              const issueNumber = parseInt(issueMatch[1]);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '🎉 友链已成功添加并同步到博客站点！\n\n数据已自动推送到静态资源仓库，可以稍后访问 https://www.xiaoten.com/pages/links/ 查看。\n\n感谢你的申请！'
              });
              
              // 关闭 Issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }
      
      - name: Notify sync completion
        if: env.has_changes == 'true'
        run: |
          echo "✅ links.json has been synced to static-xiaoten-com repository"
          echo "🚀 Cloudflare Pages will auto-deploy the updated file"
