<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小十友链管理后台</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="友链分类">
            <div class="brand">
                <div class="brand-mark">十</div>
                <div>
                    <h1>Links Studio</h1>
                    <p>小十友链数据工作台</p>
                </div>
            </div>

            <div class="status-panel">
                <span class="status-dot"></span>
                <div>
                    <strong>Local-first</strong>
                    <p>直接编辑浏览器内存数据，导出后回写 links.json。</p>
                </div>
            </div>

            <nav class="category-list" id="categoryList"></nav>

            <div class="sidebar-actions">
                <label class="file-button">
                    <input type="file" id="importFile" accept="application/json,.json">
                    导入 JSON
                </label>
                <button type="button" id="resetButton">重载仓库数据</button>
            </div>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Friendlink Control Surface</p>
                    <h2>友情链接管理后台</h2>
                </div>
                <div class="topbar-actions">
                    <button type="button" id="copyButton">复制 JSON</button>
                    <button type="button" class="primary" id="downloadButton">下载 links.json</button>
                </div>
            </header>

            <section class="metrics" aria-label="友链统计">
                <article>
                    <span>全部友链</span>
                    <strong id="totalCount">0</strong>
                </article>
                <article>
                    <span>当前分类</span>
                    <strong id="categoryCount">0</strong>
                </article>
                <article>
                    <span>头像 URL</span>
                    <strong id="srcCount">0</strong>
                </article>
                <article>
                    <span>Gravatar</span>
                    <strong id="md5Count">0</strong>
                </article>
            </section>

            <section class="toolbar" aria-label="筛选和操作">
                <div class="search-box">
                    <span>⌕</span>
                    <input type="search" id="searchInput" placeholder="搜索名称、地址或描述">
                </div>
                <div class="toolbar-actions">
                    <button type="button" id="addButton">新增友链</button>
                    <button type="button" id="validateButton">检查重复</button>
                </div>
            </section>

            <section class="content-grid">
                <div class="table-panel">
                    <div class="panel-heading">
                        <div>
                            <h3 id="tableTitle">朋友</h3>
                            <p id="tableHint">按当前分类查看和调整排序。</p>
                        </div>
                        <span id="dirtyBadge" class="dirty-badge" hidden>未导出</span>
                    </div>

                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>站点</th>
                                    <th>地址</th>
                                    <th>头像</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="linksTable"></tbody>
                        </table>
                    </div>
                </div>

                <aside class="editor-panel" aria-label="友链编辑表单">
                    <div class="panel-heading">
                        <div>
                            <h3 id="formTitle">新增友链</h3>
                            <p>保存后只更新页面内数据，使用导出按钮落盘。</p>
                        </div>
                    </div>

                    <form id="linkForm">
                        <label>
                            分类
                            <select id="categoryField" name="category">
                                <option value="friends">朋友</option>
                                <option value="experts">大佬</option>
                                <option value="groups">联盟组织</option>
                            </select>
                        </label>
                        <label>
                            博客名称
                            <input id="nameField" name="name" required placeholder="例如：小十博客">
                        </label>
                        <label>
                            博客地址
                            <input id="urlField" name="url" required type="url" placeholder="https://example.com/">
                        </label>
                        <label>
                            头像地址
                            <input id="srcField" name="src" placeholder="https://example.com/avatar.png">
                        </label>
                        <label>
                            Gravatar MD5
                            <input id="md5Field" name="md5" placeholder="md5 hash，和头像地址二选一">
                        </label>
                        <label>
                            博客描述
                            <textarea id="desField" name="des" rows="4" placeholder="一句简短描述"></textarea>
                        </label>

                        <div class="preview-card" id="previewCard">
                            <div class="avatar-preview" id="avatarPreview">十</div>
                            <div>
                                <strong id="previewName">尚未选择站点</strong>
                                <p id="previewDescription">填写表单后可预览公开侧卡片内容。</p>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" id="clearButton">清空</button>
                            <button type="submit" class="primary">保存到列表</button>
                        </div>
                    </form>
                </aside>
            </section>
        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
</body>
</html>
